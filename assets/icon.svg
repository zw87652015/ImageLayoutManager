<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="clipA">
      <rect x="28" y="32" width="85" height="192" rx="5"/>
    </clipPath>
    <clipPath id="clipB">
      <rect x="123" y="32" width="105" height="91" rx="5"/>
    </clipPath>
    <clipPath id="clipC">
      <rect x="123" y="133" width="105" height="91" rx="5"/>
    </clipPath>
  </defs>

  <!-- Background: deep academic navy -->
  <rect x="8" y="8" width="240" height="240" rx="40" fill="#1b2a4a"/>

  <!-- Panel A (left, tall) -->
  <rect x="28" y="32" width="85" height="192" rx="5" fill="#f5f7fa"/>
  <!-- Panel B (right, top) -->
  <rect x="123" y="32" width="105" height="91" rx="5" fill="#f5f7fa"/>
  <!-- Panel C (right, bottom) -->
  <rect x="123" y="133" width="105" height="91" rx="5" fill="#f5f7fa"/>

  <!-- Panel A content: scatter plot with regression line -->
  <g clip-path="url(#clipA)">
    <line x1="42" y1="200" x2="42" y2="62"  stroke="#c5cad4" stroke-width="1.2"/>
    <line x1="42" y1="200" x2="104" y2="200" stroke="#c5cad4" stroke-width="1.2"/>
    <!-- regression line -->
    <line x1="46" y1="194" x2="102" y2="78" stroke="#4a90d9" stroke-width="1.8" stroke-dasharray="3 2" opacity="0.7"/>
    <!-- dots -->
    <circle cx="50"  cy="189" r="3.2" fill="#e8b84b"/>
    <circle cx="56"  cy="179" r="3.2" fill="#e8b84b"/>
    <circle cx="62"  cy="164" r="3.2" fill="#e8b84b"/>
    <circle cx="68"  cy="157" r="3.2" fill="#e8b84b"/>
    <circle cx="74"  cy="143" r="3.2" fill="#e8b84b"/>
    <circle cx="80"  cy="131" r="3.2" fill="#e8b84b"/>
    <circle cx="86"  cy="117" r="3.2" fill="#e8b84b"/>
    <circle cx="92"  cy="106" r="3.2" fill="#e8b84b"/>
    <circle cx="98"  cy="93"  r="3.2" fill="#e8b84b"/>
    <circle cx="101" cy="82"  r="3.2" fill="#e8b84b"/>
  </g>

  <!-- Panel B content: smooth time-series curve with fill -->
  <g clip-path="url(#clipB)">
    <line x1="134" y1="108" x2="134" y2="46"  stroke="#c5cad4" stroke-width="1.2"/>
    <line x1="134" y1="108" x2="220" y2="108" stroke="#c5cad4" stroke-width="1.2"/>
    <path d="M138 100 C148 100 152 56 162 72 C172 88 177 54 188 63 C199 72 206 84 220 78"
          fill="none" stroke="#5cb85c" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M138 100 C148 100 152 56 162 72 C172 88 177 54 188 63 C199 72 206 84 220 78 L220 108 L138 108 Z"
          fill="#5cb85c" opacity="0.12"/>
  </g>

  <!-- Panel C content: bar chart -->
  <g clip-path="url(#clipC)">
    <line x1="134" y1="208" x2="134" y2="148" stroke="#c5cad4" stroke-width="1.2"/>
    <line x1="134" y1="208" x2="220" y2="208" stroke="#c5cad4" stroke-width="1.2"/>
    <rect x="140" y="183" width="16" height="25" rx="2" fill="#4a90d9" opacity="0.85"/>
    <rect x="160" y="167" width="16" height="41" rx="2" fill="#4a90d9" opacity="0.85"/>
    <rect x="180" y="174" width="16" height="34" rx="2" fill="#4a90d9" opacity="0.85"/>
    <rect x="200" y="158" width="16" height="50" rx="2" fill="#e8b84b" opacity="0.90"/>
  </g>

  <!-- Panel labels — gold, bold, academic style -->
  <text x="33"  y="52"  font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#e8b84b">A</text>
  <text x="128" y="52"  font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#e8b84b">B</text>
  <text x="128" y="153" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#e8b84b">C</text>
</svg>
