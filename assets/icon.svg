<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <!-- Inner shadow effect for cells -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- App icon background (rounded square) -->
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bgGrad)"/>

  <!-- Grid representing image layout -->
  <g fill="white" opacity="0.95">
    <!-- Top-left cell -->
    <rect x="40" y="40" width="80" height="70" rx="6" filter="url(#shadow)"/>
    <!-- Top-right cell -->
    <rect x="136" y="40" width="80" height="70" rx="6" filter="url(#shadow)"/>
    <!-- Bottom-left cell -->
    <rect x="40" y="126" width="80" height="90" rx="6" filter="url(#shadow)"/>
    <!-- Bottom-right cell -->
    <rect x="136" y="126" width="80" height="90" rx="6" filter="url(#shadow)"/>
  </g>

  <!-- Image icons inside cells -->
  <g fill="none" stroke="#667eea" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mountain icon in top-left -->
    <path d="M55 95 L75 65 L85 80 L95 60 L105 95 Z" opacity="0.7"/>
    <circle cx="70" cy="55" r="4" fill="#667eea" stroke="none"/>

    <!-- Chart icon in top-right -->
    <rect x="148" y="55" width="56" height="40" rx="2" opacity="0.5"/>
    <path d="M155 85 L165 70 L175 75 L185 55 L195 65" opacity="0.7"/>

    <!-- Photo icon in bottom-left -->
    <circle cx="95" cy="160" r="18" opacity="0.4"/>
    <path d="M55 200 L70 175 L85 190 L100 165 L115 200 Z" opacity="0.6"/>

    <!-- Microscope/science icon in bottom-right -->
    <circle cx="176" cy="165" r="12" opacity="0.6"/>
    <path d="M176 177 L176 195 M165 195 L187 195" opacity="0.7"/>
    <path d="M190 155 L195 150" opacity="0.5"/>
  </g>

  <!-- Corner accent for label feel -->
  <text x="44" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#764ba2" opacity="0.6">A</text>
</svg>
